name: 🔄 Sync Meta Ads

on:
  schedule:
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      days:
        description: 'Quantos dias para trás buscar (ex: 30)'
        required: false
        default: '30'
      date_from:
        description: 'Data inicial (YYYY-MM-DD)'
        required: false
      date_to:
        description: 'Data final (YYYY-MM-DD)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar dados da Meta Ads API
        env:
          META_TOKEN:    ${{ secrets.META_TOKEN }}
          META_ACCOUNTS: ${{ secrets.META_ACCOUNTS }}
          META_DAYS:     ${{ github.event.inputs.days || '30' }}
          META_FROM:     ${{ github.event.inputs.date_from || '' }}
          META_TO:       ${{ github.event.inputs.date_to || '' }}
        run: node scripts/fetch-meta.js

      - name: Commit e push do data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data.json
          git diff --staged --quiet || git commit -m "🔄 Sync Meta Ads — $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
