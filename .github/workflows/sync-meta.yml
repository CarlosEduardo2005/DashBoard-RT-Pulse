name: 🔄 Sync Meta Ads

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT (UTC-3)
    - cron: '0 15 * * *'   # 12:00 BRT
    - cron: '0 18 * * *'   # 15:00 BRT
    - cron: '0 21 * * *'   # 18:00 BRT
    - cron: '59 2 * * *'   # 23:59 BRT

  workflow_dispatch:
    inputs:
      days:
        description: 'Últimos N dias (ex: 30)'
        required: false
        default: '30'
      date_from:
        description: 'Data inicial YYYY-MM-DD (sobrescreve "days")'
        required: false
      date_to:
        description: 'Data final YYYY-MM-DD (sobrescreve "days")'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar dados da Meta Ads API
        env:
          META_TOKEN:    ${{ secrets.META_TOKEN }}
          META_ACCOUNTS: ${{ secrets.META_ACCOUNTS }}
          META_DAYS:     ${{ github.event.inputs.days || '30' }}
          META_FROM:     ${{ github.event.inputs.date_from || '' }}
          META_TO:       ${{ github.event.inputs.date_to || '' }}
        run: node scripts/fetch-meta.js

      - name: Commit e push do data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data.json
          git diff --staged --quiet || git commit -m "🔄 Sync Meta Ads — $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
